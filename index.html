<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #58a6ff;
            --platform-bg: #161b22;
            --highlight-color: #00f7ff;
            --input-border: #30363d;
            --button-bg: #00f7ff;
            --button-text: #0d1117;
            --glow-effect: 0 0 15px #00f7ff;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--highlight-color);
            text-shadow: var(--glow-effect);
        }

        p {
            font-size: 1rem;
            margin-bottom: 2rem;
            color: #8b949e;
        }

        .downloader-box {
            background-color: var(--platform-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--input-border);
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            background-color: #0d1117;
            border: 1px solid var(--input-border);
            color: #c9d1d9;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--highlight-color);
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #00d4db;
        }

        button:active {
            transform: scale(0.98);
        }

        #result-area {
            display: none;
            background-color: #0d1117;
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid var(--input-border);
            margin-top: 1rem;
            text-align: left;
        }

        #result-area h3 {
            margin-top: 0;
            color: #c9d1d9;
        }

        #result-area img {
            max-width: 100px;
            border-radius: 8px;
            margin-right: 15px;
        }

        #result-area .result-details {
            display: flex;
            align-items: center;
        }

        #result-area .download-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        #result-area .download-btn {
            padding: 10px 15px;
            background-color: transparent;
            border: 1px solid var(--highlight-color);
            color: var(--highlight-color);
            cursor: pointer;
            text-decoration: none;
            border-radius: 6px;
        }

        #result-area .download-btn:hover {
            background-color: rgba(0, 247, 255, 0.1);
        }

        .platforms-box {
            background-color: var(--platform-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--input-border);
        }

        h2 {
            font-size: 1.2rem;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .platform {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-radius: 8px;
            background-color: #161b22;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            color: #8b949e;
        }

        .platform span {
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .platform svg {
            width: 24px;
            height: 24px;
            fill: #8b949e;
        }

        .platform.active {
            border-color: var(--highlight-color);
            background-color: rgba(0, 247, 255, 0.1);
            color: var(--highlight-color);
            box-shadow: var(--glow-effect);
        }

        .platform.active svg {
            fill: var(--highlight-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Universal Video Downloader</h1>
        <p>Download videos from multiple platforms instantly</p>

        <div class="downloader-box">
            <div class="input-group">
                <input type="text" id="url-input" placeholder="Paste video URL here...">
                <button id="fetch-btn">Fetch</button>
            </div>
            
            <div id="result-area">
                <div class="result-details">
                    <img id="result-thumbnail" src="" alt="Thumbnail">
                    <div id="result-title"></div>
                </div>
                <div class="download-buttons">
                    <a id="download-hd" class="download-btn" href="#" target="_blank">Download HD</a>
                    <a id="download-sd" class="download-btn" href="#" target="_blank">Download SD</a>
                </div>
            </div>
        </div>

        <div class="platforms-box">
            <h2>Supported Platforms</h2>
            <div class="platform-grid">
                <div class="platform" id="facebook">
                    <svg viewBox="0 0 24 24"><path d="M12 2.04c-5.5 0-10 4.49-10 10.02 0 5 3.66 9.15 8.44 9.9v-7h-2.54v-2.9h2.54v-2.21c0-2.51 1.49-3.89 3.78-3.89 1.09 0 2.23.19 2.23.19v2.47h-1.26c-1.24 0-1.63.77-1.63 1.56v1.88h2.78l-.45 2.9h-2.33v7c4.78-.75 8.44-4.9 8.44-9.9 0-5.53-4.5-10.02-10-10.02z"/></svg>
                    <span>Facebook</span>
                </div>
                <div class="platform" id="youtube">
                    <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    <span>YouTube</span>
                </div>
                <div class="platform" id="twitter">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    <span>Twitter/X</span>
                </div>
                <div class="platform" id="instagram">
                    <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.848 0-3.204.012-3.584.07-4.849.149-3.225 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.668-.073-4.948-.197-4.359-2.62-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
                    <span>Instagram</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const fetchBtn = document.getElementById('fetch-btn');
        const resultArea = document.getElementById('result-area');
        const resultThumbnail = document.getElementById('result-thumbnail');
        const resultTitle = document.getElementById('result-title');
        const downloadHd = document.getElementById('download-hd');
        const downloadSd = document.getElementById('download-sd');
        const platforms = document.querySelectorAll('.platform');

        fetchBtn.addEventListener('click', () => {
            const url = urlInput.value.toLowerCase();
            platforms.forEach(p => p.classList.remove('active'));
            resultArea.style.display = 'none';

            if (!url) {
                alert('Please paste a video URL.');
                return;
            }

            // Simulate parsing and fetching
            let platformId = null;
            if (url.includes('youtube.com') || url.includes('youtu.be')) platformId = 'youtube';
            else if (url.includes('facebook.com') || url.includes('fb.watch')) platformId = 'facebook';
            else if (url.includes('twitter.com') || url.includes('x.com')) platformId = 'twitter';
            else if (url.includes('instagram.com')) platformId = 'instagram';

            if (platformId) {
                const activePlatform = document.getElementById(platformId);
                activePlatform.classList.add('active');

                // Simulate result display (In real case, fetch from API)
                resultArea.style.display = 'block';
                resultThumbnail.src = 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg'; // Dummy thumbnail
                resultTitle.innerHTML = '<h3>Sample Video Title</h3><p>Example title for demonstration.</p>';
                downloadHd.href = '#hd_link'; // Dummy link
                downloadSd.href = '#sd_link'; // Dummy link
            } else {
                alert('Unsupported or invalid URL.');
            }
        });
    </script>
</body>
</html>
